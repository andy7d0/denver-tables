# каждый включаемый файл соответствует одному физическому серверу
# web-app-docker-compose - в prod - двум  идентичным серверам ext/int app
# 
include:
   - path: ./dev/compile/app-builder/app-builder-compose.yml
     project_directory: .
   - path: ./src/app/ext/servers/app/app-php-compose.yml
     project_directory: .
   - path: ./src/app/common/servers/web-compose.yml
     project_directory: .
   # - path: ./databases/main_db/main-db-compose.yml
   #   project_directory: .

services:
  # dev containers runned once
  # make all volumes owned correctly

  curl:
    image: alpine/curl
    environment:
      - S_UID=${S_UID}
      - S_GID=${S_GID}
      - S_PWD=${PWD}
    user: ${S_UID}:${S_GID}
    volumes:
      - .:/top 
    command: /bin/sh

  bun:
    image: oven/bun:1.3-alpine
    ports:
      - ${HOST_LOOPBACK_IP}:3000:3000
    volumes:
      - .:/app
    user: ${S_UID}:${S_GID}
    init: true
    working_dir: /app
    entrypoint: bun run dev
    depends_on:
       - web

